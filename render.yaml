services:
  - type: web
    name: tanesco-pole-monitor
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tanesco-db
          property: connectionString

databases:
  - name: tanesco-db
    databaseName: tanesco_monitor
    user: tanesco_user
    plan: free
